name: Publish Adapter

# Cross-compile the adapter for every supported platform, lay the binaries out
# as bin/<os>/<arch>/<name>, and publish them as a single multi-platform, signed
# OCI artifact via the reusable brokenbots/publish-adapter action. The SDK is a
# file: dependency, checked out as a sibling and built first; the per-target
# build scripts also vendor the SDK proto/ needed at compile time.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without leading v)'
        required: false
        default: '0.0.0-dev'

permissions:
  contents: read
  packages: write
  id-token: write # cosign keyless signing

env:
  ADAPTER_NAME: criteria-adapter-greeter

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout adapter
        uses: actions/checkout@v4
        with:
          path: criteria-typescript-adapter-greeter

      - name: Checkout SDK (sibling)
        uses: actions/checkout@v4
        with:
          repository: brokenbots/criteria-typescript-adapter-sdk
          path: criteria-typescript-adapter-sdk

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build SDK
        working-directory: criteria-typescript-adapter-sdk
        run: |
          bun install
          bun run build

      - name: Cross-compile adapter binaries
        working-directory: criteria-typescript-adapter-greeter
        # Use the per-target build scripts (they vendor the SDK proto/), then
        # relocate the outputs into the bin/<os>/<arch>/<name> layout that
        # `criteria adapter publish` scans for a multi-platform artifact.
        run: |
          set -euo pipefail
          bun install
          bun run build:linux-x64
          bun run build:linux-arm64
          bun run build:darwin-arm64
          mkdir -p artifact/bin/linux/amd64 artifact/bin/linux/arm64 artifact/bin/darwin/arm64
          mv out/adapter-linux-amd64  "artifact/bin/linux/amd64/${ADAPTER_NAME}"
          mv out/adapter-linux-arm64  "artifact/bin/linux/arm64/${ADAPTER_NAME}"
          mv out/adapter-darwin-arm64 "artifact/bin/darwin/arm64/${ADAPTER_NAME}"

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish
        uses: brokenbots/publish-adapter@v0
        with:
          # Directory containing the multi-platform bin/<os>/<arch>/ tree.
          binary: ${{ github.workspace }}/criteria-typescript-adapter-greeter/artifact
          registry: ghcr.io/${{ github.repository_owner }}/${{ env.ADAPTER_NAME }}:${{ steps.ver.outputs.tag }}
